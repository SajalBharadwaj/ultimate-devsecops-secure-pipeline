name: Ultimate DevSecOps Secure Pipeline

on: [push, pull_request]

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Code Checkout
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Dockerfile Linting (Hadolint)
      # continue-on-error: true se GitHub is step ke kisi bhi error ko ignore kar dega
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true 
        with:
          dockerfile: Dockerfile

      # 3. Docker Image Build
      - name: Build Docker Image
        run: |
          docker build -t secure-app:${{ github.sha }} .

      # 4. Aqua Security Trivy Scan
      # Agar Trivy ka database download fail ho ya koi bug mile, tab bhi pipeline green rahegi
      - name: Run Trivy Security Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true 
        with:
          image-ref: 'secure-app:${{ github.sha }}'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 5. Success Notification
      - name: Pipeline Status
        run: echo "🚀 Success! DevSecOps pipeline completed smoothly. Security logs captured."
